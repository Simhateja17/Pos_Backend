name: Real-Supabase Integration Tests

# Manual-trigger only: these tests seed/delete real rows and real Supabase Auth
# users in a live project. They need a direct Postgres connection (DATABASE_URL,
# RLS_DATABASE_URL) which is blocked on some networks (sandboxed CI runners,
# some campus/corporate wifi) — GitHub's hosted runners have unrestricted
# outbound egress, so this workflow exists to run them from there instead.
on:
  workflow_dispatch: {}

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # npm ci fails here: an optional wasm dependency of vitest's rolldown
        # bundler resolves inconsistently in package-lock.json across host
        # platforms (macOS arm64 vs. this runner's linux x64), tripping npm
        # ci's strict lockfile-sync check even though the lockfile is fine.
        run: npm install

      - name: Generate Prisma Client
        # @prisma/client is installed as a package, but the actual generated
        # client code (node_modules/.prisma/client) only exists after this
        # runs — never ran in CI before, so tests failed with "Cannot find
        # module '.prisma/client/default'".
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Run Phase 1 real-Supabase integration tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RLS_DATABASE_URL: ${{ secrets.RLS_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          INVITE_REDIRECT_URL: http://localhost:3000/accept-invite
          CORS_ORIGIN: http://localhost:3000
        run: >
          npx vitest run
          tests/tenancy/rls-enforcement.test.ts
          tests/auth/login.test.ts
          tests/auth/role-gating.test.ts
          tests/auth/invite-flow.test.ts
